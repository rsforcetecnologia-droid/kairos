<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen text-gray-200">

    <div class="w-full max-w-sm">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">KAIROS</h1>
            <p class="text-gray-400 mt-2">Painel de Super-Administrador</p>
        </header>

        <div class="bg-gray-800 rounded-lg shadow-xl p-8">
            <form id="loginForm">
                <div class="mb-4">
                    <label for="email" class="block mb-2 text-sm font-medium">E-mail</label>
                    <input type="email" id="email" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="text-sm font-medium">Senha</label>
                        <a href="#" id="forgotPasswordLink" class="text-sm text-indigo-400 hover:text-indigo-300">Esqueci a senha</a>
                    </div>
                    <input type="password" id="password" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>

                <div id="errorMessage" class="hidden text-center text-red-400 text-sm mb-4"></div>
                <div id="successMessage" class="hidden text-center text-green-400 text-sm mb-4"></div>

                <button type="submit" id="loginButton" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-300 disabled:bg-indigo-400">
                    <span>Entrar</span>
                </button>
            </form>

            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-600"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase">Ou</span>
                <div class="flex-grow border-t border-gray-600"></div>
            </div>

            <button id="googleLoginButton" class="w-full bg-white text-gray-900 font-bold py-3 px-4 rounded-lg hover:bg-gray-200 transition duration-300 flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
                <span>Entrar com Google</span>
            </button>
        </div>
    </div>

    <script type="module">
        // 1. IMPORTAÇÃO CENTRALIZADA DO FIREBASE
        // Vamos usar a mesma instância que o resto do teu sistema utiliza!
        import { auth } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, signOut, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const provider = new GoogleAuthProvider();

        const loginForm = document.getElementById('loginForm');
        const errorMessageDiv = document.getElementById('errorMessage');
        const googleLoginButton = document.getElementById('googleLoginButton');

        // 2. VERIFICAÇÃO DE SEGURANÇA BASEADA NO TOKEN
        async function checkAdminPrivileges(user) {
            try {
                // O "true" força a ir buscar o token mais atualizado ao servidor
                const idTokenResult = await user.getIdTokenResult(true);
                const role = idTokenResult.claims.role;

                // Verificamos se o utilizador tem a claim de administrador
                if (role === 'super-admin' || role === 'super_admin') {
                    // Login com sucesso! Vai para o painel
                    window.location.href = 'admin.html'; 
                } else {
                    // Tem conta, mas não é administrador.
                    errorMessageDiv.textContent = 'Acesso negado. Esta conta não é um Super Admin.';
                    errorMessageDiv.classList.remove('hidden');
                    await signOut(auth); // Expulsa o intruso
                }
            } catch (error) {
                console.error("Erro ao ler segurança:", error);
                errorMessageDiv.textContent = 'Erro ao validar permissões.';
                errorMessageDiv.classList.remove('hidden');
                await signOut(auth);
            }
        }

        // --- LOGIN COM GOOGLE ---
        googleLoginButton.addEventListener('click', async () => {
            errorMessageDiv.classList.add('hidden');
            try {
                const result = await signInWithPopup(auth, provider);
                await checkAdminPrivileges(result.user);
            } catch (error) {
                console.error("Erro Google Login:", error);
                errorMessageDiv.textContent = 'Erro ao entrar com o Google.';
                errorMessageDiv.classList.remove('hidden');
            }
        });

        // --- LOGIN TRADICIONAL ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorMessageDiv.classList.add('hidden');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                await checkAdminPrivileges(userCredential.user);
            } catch (error) {
                console.error("Erro Login:", error);
                errorMessageDiv.textContent = 'E-mail ou senha inválidos.';
                errorMessageDiv.classList.remove('hidden');
            }
        });

        // --- RECUPERAÇÃO DE SENHA ---
        document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) { alert("Digite seu e-mail primeiro."); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("E-mail de recuperação enviado!");
            } catch (error) { 
                alert("Erro ao enviar e-mail."); 
            }
        });
    </script>
</body>
</html>
