<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agendamento Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --theme-main: #4f46e5;
            --theme-contrast: #ffffff;
            --content-text-color: #111827; 
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.40); 
            backdrop-filter: blur(3px); 
            z-index: 0; 
            pointer-events: none; 
        }

        #booking-view, #branch-selector-view {
            position: relative;
            z-index: 1;
        }

        .theme-bg { background-color: var(--theme-main); color: var(--theme-contrast); }
        .theme-text { color: var(--theme-main); }
        .theme-border { border-color: var(--theme-main); }
        .theme-ring:focus { --tw-ring-color: var(--theme-main); }
        .custom-text-color { color: var(--content-text-color); }

        .glass-panel {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        
        .glass-panel-dark {
            background-color: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .service-card, .professional-card, .time-slot-btn, .branch-card { transition: all 0.2s ease; }
        
        .service-card.selected, .professional-card.selected {
            border-color: var(--theme-main);
            background-color: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .service-card.selected .check-icon, .professional-card.selected .check-icon { 
            opacity: 1; transform: scale(1); 
        }
        
        .time-slot-selected { 
            background-color: var(--theme-main) !important; 
            color: var(--theme-contrast) !important; 
            font-weight: 600; 
            transform: scale(1.05); 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .hidden { display: none; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--theme-main);
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
<link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
<body class="antialiased text-gray-800">

    <div class="fixed top-0 left-0 right-0 z-40 px-4 py-3">
        <div class="glass-panel-dark rounded-full px-4 py-2 flex justify-between items-center max-w-2xl mx-auto">
             <a href="/index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <img src="/assets/logo_kairos-Cl8ouf1y.png" alt="Kairos" class="h-9 w-auto opacity-90">
            </a>
            
            <button id="myAppointmentsBtn" class="text-xs font-semibold text-white bg-white/10 hover:bg-white/20 border border-white/10 px-3 py-1.5 rounded-full transition-colors flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />

    <div id="branch-selector-view" class="pt-24 pb-10 px-4 min-h-screen flex-col items-center justify-center hidden">

            <div id="branches-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left">
                </div>

    </div>

    <div id="booking-view" class="pt-20 pb-10 px-3 min-h-screen flex flex-col items-center justify-start hidden">
        
        <header class="w-full max-w-lg mb-6 text-center fade-in"> 
            <div class="relative inline-block mb-3">
                <div id="logo-container" class="h-20 w-20 rounded-full bg-white p-1 shadow-lg mx-auto overflow-hidden">

        </header>

        <main class="w-full max-w-lg glass-panel rounded-2xl p-4 sm:p-6 shadow-xl relative min-h-[400px]">
            
            <div class="absolute top-0 left-0 right-0 h-1 bg-gray-100 rounded-t-2xl overflow-hidden">

            <section id="services-section" class="fade-in">

                </div>

            <section id="schedule-section" class="hidden">

                        Quando?
                    </h2>
                    <button id="schedule-back-btn" class="text-xs text-gray-500 hover:text-gray-800 underline">Voltar</button>
                </div>
                
                <div class="bg-gray-50/80 rounded-xl p-3 mb-4 border border-gray-100">
                    <div class="flex justify-between items-center mb-3">

                            <p class="text-gray-600 text-sm mt-0.5">com <span id="summary-professional" class="font-bold text-gray-800"></span></p>
                            <div class="mt-2 inline-flex items-center gap-1.5 bg-white border border-gray-200 px-2.5 py-1 rounded-md">
                                <i class="bi bi-calendar-event theme-text text-sm"></i>

                <form id="confirmation-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Como se chama?</label>
                        <input type="text" id="clientName" class="w-full p-3 bg-white border border-gray-300 rounded-xl text-sm focus:ring-2 theme-ring focus:border-transparent outline-none shadow-sm transition-all" placeholder="Ex: João Silva" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">WhatsApp</label>
                        <input type="tel" id="clientPhone" maxlength="15" class="w-full p-3 bg-white border border-gray-300 rounded-xl text-sm focus:ring-2 theme-ring focus:border-transparent outline-none shadow-sm transition-all" placeholder="(00) 00000-0000" required>
                    </div>
                    <button type="submit" id="btn-confirm" class="w-full theme-bg text-white font-bold text-lg py-3.5 rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all mt-4 flex justify-center items-center gap-2">
                        <i class="bi bi-check2-circle"></i> Confirmar Horário
                    </button>
                </form>
            </section>
        </main>
        
        <footer class="mt-8 text-center opacity-70">
            <p class="text-xs custom-text-color font-medium">Powered by <a href="#" class="font-bold hover:underline">Kairos System</a></p>

    <div id="my-appointments-view" class="hidden fixed inset-0 z-50 bg-gray-100 flex flex-col fade-in">
        <div class="bg-white shadow-sm p-4 flex items-center gap-3">
            <button data-action="close-appointments-view" class="p-1 rounded-full hover:bg-gray-100">
                <i class="bi bi-arrow-left text-xl text-gray-600"></i>

            <h2 class="text-lg font-bold text-gray-800">Meus Agendamentos</h2>

    <div id="notificationModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-6 hidden backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 text-center max-w-sm w-full animate-[bounce_0.2s_ease-out]">
          <h3 id="modal-title" class="text-lg font-bold text-gray-900 mb-2"></h3>
          <p id="modal-message" class="text-sm text-gray-600 mb-6"></p>
          <button id="modal-ok-btn" class="w-full py-3 theme-bg text-white font-bold rounded-xl shadow hover:opacity-90 transition-opacity">Entendi</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            function setupPhoneMask(inputId) {
                const input = document.getElementById(inputId);
                if (!input) return;

                input.addEventListener('input', (e) => {
                    let value = e.target.value.replace(/\D/g, ""); 
                    if (value.length > 11) value = value.substring(0, 11);
                    if (value.length > 10) { value = value.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3"); } 
                    else if (value.length > 6) { value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3"); } 
                    else if (value.length > 2) { value = value.replace(/^(\d{2})(\d{0,5})/, "($1) $2"); } 
                    else if (value.length > 0) { value = value.replace(/^(\d*)/, "($1"); }
                    e.target.value = value;
                });
            }

            setupPhoneMask('clientPhone');

            function applyCustomization(data) {
                const root = document.documentElement;
                const primaryColor = data.primaryColor || data.themeColor || '#4f46e5'; 
                root.style.setProperty('--theme-main', primaryColor);
                if (data.textColor) root.style.setProperty('--content-text-color', data.textColor);

                if (data.backgroundImage) {
                    document.body.style.backgroundImage = `url('${data.backgroundImage}')`;
                } else {
                    document.body.style.backgroundImage = 'none';
                    document.body.style.backgroundColor = '#f3f4f6';
                }
            }

            const API_BASE_URL = window.location.origin;
            const urlParams = new URLSearchParams(window.location.search);
            const URL_ID = urlParams.get('id'); 
            
            // 🔥 A NOVA BANDEIRA (Força abrir a agenda em vez do menu de filiais)
            const FORCE_DIRECT = urlParams.get('direct') === 'true';
            
            let REAL_ESTABLISHMENT_ID = null; 
            let currentWeekStart = getStartOfWeek(new Date());
            let allServicesData = [];
            let allProfessionalsData = [];
            
            const booking = { professionalId: null, professionalName: null, services: [], date: null, time: null };

            const bookingView = document.getElementById('booking-view');
            const branchSelectorView = document.getElementById('branch-selector-view');
            
            const myAppointmentsView = document.getElementById('my-appointments-view');
            const myAppointmentsContent = document.getElementById('appointments-content');
            const myAppointmentsBtn = document.getElementById('myAppointmentsBtn');
            
            const servicesContainer = document.getElementById('services-container');
            const professionalsContainer = document.getElementById('professionals-container');
            const morningSlotsContainer = document.getElementById('morning-slots');
            const afternoonSlotsContainer = document.getElementById('afternoon-slots');
            const weekContainer = document.getElementById('week-container');
            
            const confirmationForm = document.getElementById('confirmation-form');
            const prevWeekBtn = document.getElementById('prev-week-btn');
            const nextWeekBtn = document.getElementById('next-week-btn');
            const monthYearDisplay = document.getElementById('month-year-display');
            
            document.getElementById('professionals-back-btn').addEventListener('click', () => showSection('services'));
            document.getElementById('schedule-back-btn').addEventListener('click', () => showSection('professionals'));
            document.getElementById('confirmation-back-btn').addEventListener('click', () => showSection('schedule'));

            if (!URL_ID) {
                document.body.innerHTML = '<div class="flex h-screen items-center justify-center p-4 text-center text-gray-500 font-bold">Link da loja não encontrado. Peça o link correto ao estabelecimento.</div>';
                return;
            }

            const sections = { 
                services: document.getElementById('services-section'), 
                professionals: document.getElementById('professionals-section'), 
                schedule: document.getElementById('schedule-section'), 
                confirmation: document.getElementById('confirmation-section') 
            };

            function updateProgress(step) {
                document.getElementById('progress-bar').style.width = `${step * 25}%`;
            }

            function showNotificationModal(title, message) {
                document.getElementById('modal-title').textContent = title;
                document.getElementById('modal-message').textContent = message;
                document.getElementById('notificationModal').classList.remove('hidden');
            }
            document.getElementById('modal-ok-btn').addEventListener('click', () => document.getElementById('notificationModal').classList.add('hidden'));

            function getStartOfWeek(date) {
                const d = new Date(date);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                return new Date(d.setDate(diff));
            }

            const showSection = (sectionName) => {
                Object.keys(sections).forEach(key => sections[key].classList.add('hidden'));
                sections[sectionName].classList.remove('hidden');
                sections[sectionName].classList.add('fade-in');
                
                const steps = { services: 1, professionals: 2, schedule: 3, confirmation: 4 };
                updateProgress(steps[sectionName]);

                if (sectionName === 'schedule' && booking.date) {
                    morningSlotsContainer.innerHTML = '<div class="loader mx-auto col-span-4 mt-4"></div>';
                    afternoonSlotsContainer.innerHTML = '';
                    loadAvailability(booking.date);
                }
            };

            // 🔥 LÓGICA MULTI-TENANT: VERIFICA SE O LINK É MATRIZ COM FILIAIS E SE DEVE SALTAR O MENU
            const checkNetworkAndLoad = async () => {
                try {
                    const estRes = await fetch(`${API_BASE_URL}/api/establishments/${URL_ID}`);
                    if (!estRes.ok) throw new Error('Estabelecimento não encontrado.');
                    const establishmentData = await estRes.json();
                    
                    applyCustomization(establishmentData);

                    if (establishmentData.publicBookingEnabled === false) {
                        document.body.innerHTML = `
                            <div class="bg-gray-100 h-screen flex items-center justify-center p-4">
                                <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full">
                                    <i class="bi bi-calendar-x text-5xl text-red-500 mb-4 block"></i>
                                    <h2 class="text-xl font-bold text-gray-900 mb-2">Agenda Temporariamente Fechada</h2>
                                    <p class="text-gray-600 text-sm">O agendamento online para <strong class="text-gray-800">${establishmentData.name}</strong> está desativado no momento.</p>
                                </div>
                            </div>
                        `;
                        return;
                    }

                    const branchesRes = await fetch(`${API_BASE_URL}/api/establishments/${URL_ID}/branches`);
                    const branches = branchesRes.ok ? await branchesRes.json() : [];

                    // 🔥 SE TEM FILIAIS E NÃO TEM A BANDEIRA DE "DIRETO", MOSTRA O MENU
                    if (branches && branches.length > 0 && !FORCE_DIRECT) {
                        document.getElementById('booking-view').classList.add('hidden');
                        branchSelectorView.classList.remove('hidden');
                        branchSelectorView.classList.add('flex');

                        if (establishmentData.logo) {
                            document.getElementById('networkLogo').src = establishmentData.logo;
                            document.getElementById('network-logo-container').classList.remove('hidden');
                        }
                        document.getElementById('networkName').textContent = `Bem-vindo(a) à ${establishmentData.name}`;

                        const todasUnidades = [
                            { id: URL_ID, name: establishmentData.name + " (Matriz)", address: establishmentData.address },
                            ...branches
                        ];

                        document.getElementById('branches-list').innerHTML = todasUnidades.map(unidade => {
                            // Se ele clicar na matriz novamente, adicionamos &direct=true na URL
                            const destinationUrl = unidade.id === URL_ID ? `?id=${unidade.id}&direct=true` : `?id=${unidade.id}`;
                            
                            return `
                            <button onclick="window.location.href='${destinationUrl}'" class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md hover:border-[color:var(--theme-main)] hover:bg-gray-50 transition-all text-left flex items-start gap-4 group">
                                <div class="w-12 h-12 theme-bg rounded-full flex items-center justify-center flex-shrink-0 text-white shadow-inner group-hover:scale-105 transition-transform">
                                    <i class="bi bi-geo-alt-fill text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-gray-800 group-hover:theme-text">${unidade.name}</h3>
                                    <p class="text-xs text-gray-500 mt-1 line-clamp-2">${unidade.address || 'Localização principal'}</p>
                                </div>
                            </button>
                            `;
                        }).join('');

                    } else {
                        // NÃO TEM FILIAIS (OU FOI FORÇADO A ENTRAR DIRETO) -> Abre a agenda!
                        branchSelectorView.classList.add('hidden');
                        bookingView.classList.remove('hidden');

                        REAL_ESTABLISHMENT_ID = establishmentData.id;
                        document.getElementById('establishmentName').innerHTML = establishmentData.name;
                        document.getElementById('establishmentWelcomeMessage').textContent = establishmentData.welcomeMessage || 'Selecione um serviço abaixo para começar.';
                        
                        if (establishmentData.logo) {
                            document.getElementById('establishmentLogo').src = establishmentData.logo;
                            document.getElementById('establishmentLogo').classList.remove('opacity-0');
                        }
                        
                        loadServices(); 
                    }

                } catch(error) {
                    document.body.innerHTML = `<div class="flex items-center justify-center h-screen bg-gray-50 font-bold text-gray-600">Erro: ${error.message}</div>`;
                }
            };
            
            const loadServices = async () => {
                servicesContainer.innerHTML = '<div class="loader mx-auto my-10"></div>';
                try {
                    const response = await fetch(`${API_BASE_URL}/api/services/${REAL_ESTABLISHMENT_ID}`);
                    if (!response.ok) throw new Error();
                    const services = await response.json();
                    allServicesData = services;
                    servicesContainer.innerHTML = '';
                    
                    if (services.length === 0) {
                        servicesContainer.innerHTML = '<div class="text-center py-10 bg-white/50 rounded-xl"><i class="bi bi-box-seam text-3xl text-gray-400"></i><p class="mt-2 text-sm font-medium text-gray-600">Nenhum serviço partilhado com esta unidade ainda.</p></div>';
                        return;
                    }

                    services.forEach(serv => {
                        if(serv.active === false) return; 

                        const card = document.createElement('div');
                        card.className = 'service-card group flex items-center justify-between p-3 bg-white border border-gray-200 rounded-xl cursor-pointer hover:border-gray-300';
                        
                        const duration = serv.duration ? `<span class="text-xs text-gray-400 font-medium ml-2 bg-gray-100 px-2 py-0.5 rounded-md"><i class="bi bi-clock"></i> ${serv.duration} min</span>` : '';
                        const photoSrc = serv.photo || `https://placehold.co/128x128/E2E8F0/4A5568?text=${encodeURIComponent(serv.name.charAt(0))}`;
                        
                        card.innerHTML = `
                            <div class="flex items-center gap-4 w-full">
                                <img src="${photoSrc}" alt="${serv.name}" class="w-16 h-16 rounded-xl object-cover border border-gray-100 flex-shrink-0 shadow-sm">
                                <div class="flex-grow min-w-0">
                                    <h3 class="font-bold text-gray-800 text-sm leading-tight truncate">${serv.name}</h3>
                                    <div class="flex items-center mt-1.5">
                                        <p class="text-sm font-bold theme-text">R$ ${serv.price.toFixed(2)}</p>
                                        ${duration}
                                    </div>
                                </div>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex-shrink-0 flex items-center justify-center check-icon transition-all duration-200 ml-2">
                                    <div class="w-3 h-3 rounded-full theme-bg opacity-0 transition-opacity"></div>
                                </div>
                            </div>
                        `;
                        
                        card.addEventListener('click', () => {
                            const isSelected = card.classList.contains('selected');
                            document.querySelectorAll('.service-card').forEach(c => {
                                c.classList.remove('selected');
                                c.querySelector('.check-icon').classList.remove('border-[color:var(--theme-main)]');
                                c.querySelector('.check-icon div').classList.add('opacity-0');
                            });

                            if (!isSelected) {
                                card.classList.add('selected');
                                card.querySelector('.check-icon').classList.add('border-[color:var(--theme-main)]');
                                card.querySelector('.check-icon div').classList.remove('opacity-0');
                                
                                booking.services = [{ id: serv.id, name: serv.name, duration: serv.duration, price: serv.price, bufferTime: serv.bufferTime || 0, photo: serv.photo }];
                                loadProfessionalsForService();
                                setTimeout(() => showSection('professionals'), 300); 
                            }
                        });
                        servicesContainer.appendChild(card);
                    });
                } catch {
                    servicesContainer.innerHTML = '<p class="text-red-500 text-center font-bold">Erro ao carregar serviços.</p>';
                }
            };
            
            const loadProfessionalsForService = async () => {
                professionalsContainer.innerHTML = '<div class="loader mx-auto col-span-3 my-10"></div>';
                try {
                    const response = await fetch(`${API_BASE_URL}/api/professionals/${REAL_ESTABLISHMENT_ID}`);
                    if (!response.ok) throw new Error();
                    allProfessionalsData = await response.json();
                    
                    const selectedServiceIds = booking.services.map(s => s.id);
                    const professionals = allProfessionalsData.filter(prof => 
                        prof.services && selectedServiceIds.every(id => prof.services.includes(id))
                    );
                    
                    professionalsContainer.innerHTML = '';
                    if (professionals.length === 0) {
                        professionalsContainer.innerHTML = '<div class="col-span-full text-center py-10 bg-white/50 rounded-xl"><i class="bi bi-person-x text-3xl text-gray-400"></i><p class="mt-2 text-sm font-medium text-gray-600">Nenhum profissional realiza este serviço.</p></div>';
                        return;
                    }

                    professionals.forEach(prof => {
                        const card = document.createElement('div');
                        card.className = 'professional-card flex flex-col items-center justify-center p-3 bg-white border border-gray-200 rounded-2xl cursor-pointer aspect-square hover:shadow-md';
                        const photoSrc = prof.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(prof.name)}&background=random&color=fff`;
                        
                        card.innerHTML = `
                            <div class="relative mb-2">
                                <img src="${photoSrc}" class="w-16 h-16 rounded-full object-cover border-2 border-gray-100 shadow-sm">
                                <div class="absolute bottom-0 right-0 w-5 h-5 rounded-full border-2 border-white bg-gray-200 flex items-center justify-center check-icon transition-all scale-0 opacity-0">
                                    <i class="bi bi-check-circle-fill text-green-500 text-lg leading-none bg-white rounded-full"></i>
                                </div>
                            </div>
                            <h4 class="font-bold text-xs text-gray-800 text-center leading-tight line-clamp-2">${prof.name.split(' ')[0]}</h4>
                        `;
                        card.addEventListener('click', () => {
                            document.querySelectorAll('.professional-card').forEach(c => c.classList.remove('selected'));
                            card.classList.add('selected');
                            booking.professionalId = prof.id;
                            booking.professionalName = prof.name;
                            renderWeek();
                            showSection('schedule');
                        });
                        professionalsContainer.appendChild(card);
                    });
                } catch {
                    professionalsContainer.innerHTML = '<p class="text-red-500 text-xs col-span-full text-center">Erro.</p>';
                }
            };

            const loadAvailability = async (selectedDate) => {
                morningSlotsContainer.innerHTML = ''; afternoonSlotsContainer.innerHTML = '';
                booking.date = selectedDate;
                const serviceIds = booking.services.map(s => s.id).join(',');
                
                try {
                    const response = await fetch(`${API_BASE_URL}/api/availability?establishmentId=${REAL_ESTABLISHMENT_ID}&professionalId=${booking.professionalId}&serviceIds=${serviceIds}&date=${selectedDate}`);
                    if (!response.ok) throw new Error();
                    const slots = await response.json();
                    
                    if (slots.length === 0) {
                        morningSlotsContainer.innerHTML = '<p class="col-span-4 text-xs text-gray-500 text-center py-4 bg-gray-100 rounded-lg">Totalmente Ocupado</p>';
                        return;
                    }

                    const now = new Date();
                    const selectedDateObj = new Date(selectedDate + 'T00:00:00');
                    const isToday = selectedDateObj.toDateString() === now.toDateString();
                    const currentMinutes = now.getHours() * 60 + now.getMinutes();

                    slots.forEach(slot => {
                        const [h, m] = slot.split(':').map(Number);
                        
                        if (isToday) {
                            const slotMinutes = h * 60 + m;
                            if (slotMinutes <= currentMinutes) return;
                        }

                        const btn = document.createElement('button');
                        btn.className = 'time-slot-btn py-2.5 text-xs font-bold bg-white text-gray-700 border border-gray-200 rounded-xl hover:border-[color:var(--theme-main)] hover:text-[color:var(--theme-main)] transition shadow-sm';
                        btn.textContent = slot;
                        btn.onclick = () => {
                            document.querySelectorAll('.time-slot-btn').forEach(b => b.classList.remove('time-slot-selected'));
                            btn.classList.add('time-slot-selected');
                            booking.time = slot;
                            updateSummary();
                            showSection('confirmation');
                        };
                        
                        if (h < 12) morningSlotsContainer.appendChild(btn);
                        else afternoonSlotsContainer.appendChild(btn);
                    });
                    
                    if (!morningSlotsContainer.hasChildNodes()) morningSlotsContainer.innerHTML = '<span class="col-span-4 text-[10px] text-gray-400 text-center italic bg-white p-2 rounded">Indisponível</span>';
                    if (!afternoonSlotsContainer.hasChildNodes()) afternoonSlotsContainer.innerHTML = '<span class="col-span-4 text-[10px] text-gray-400 text-center italic bg-white p-2 rounded">Indisponível</span>';

                } catch {
                    morningSlotsContainer.innerHTML = '<p class="text-red-500 text-xs col-span-4">Erro</p>';
                }
            };

            const renderWeek = () => {
                weekContainer.innerHTML = '';
                const today = new Date();
                today.setHours(0,0,0,0);
                
                for (let i = 0; i < 7; i++) {
                    const day = new Date(currentWeekStart);
                    day.setDate(day.getDate() + i);
                    
                    const btn = document.createElement('button');
                    btn.className = 'day-button flex flex-col items-center justify-center p-2 rounded-xl transition-all border border-transparent';
                    const isSelected = booking.date === day.toISOString().split('T')[0];
                    
                    if(isSelected) {
                        btn.classList.add('theme-bg', 'shadow-md');
                    } else {
                        btn.classList.add('bg-white', 'hover:border-gray-300');
                    }

                    const dayColorClass = isSelected ? 'theme-text-contrast opacity-90' : 'text-gray-400';
                    const numColorClass = isSelected ? 'theme-text-contrast' : 'text-gray-800';

                    btn.innerHTML = `
                        <span class="text-[10px] uppercase font-bold ${dayColorClass}">${day.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '')}</span>
                        <span class="text-base font-bold ${numColorClass} mt-0.5">${day.getDate()}</span>
                    `;

                    if (day < today) {
                        btn.classList.add('opacity-30', 'cursor-not-allowed', 'bg-gray-100');
                        btn.classList.remove('bg-white');
                    } else {
                        btn.onclick = () => {
                            document.querySelectorAll('.day-button').forEach(b => {
                                b.classList.remove('theme-bg', 'shadow-md');
                                b.classList.add('bg-white');
                                b.querySelectorAll('span')[0].className = 'text-[10px] uppercase font-bold text-gray-400';
                                b.querySelectorAll('span')[1].className = 'text-base font-bold text-gray-800 mt-0.5';
                            });
                            btn.classList.remove('bg-white');
                            btn.classList.add('theme-bg', 'shadow-md');
                            btn.querySelectorAll('span')[0].className = 'text-[10px] uppercase font-bold theme-text-contrast opacity-90';
                            btn.querySelectorAll('span')[1].className = 'text-base font-bold theme-text-contrast mt-0.5';
                            
                            const dateStr = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
                            loadAvailability(dateStr);
                        };
                    }
                    weekContainer.appendChild(btn);
                }
                monthYearDisplay.textContent = currentWeekStart.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
            };

            const updateSummary = () => {
                const s = booking.services[0];
                document.getElementById('summary-service').textContent = s.name;
                document.getElementById('summary-professional').textContent = booking.professionalName;
                
                const dateObj = new Date(booking.date + 'T00:00:00');
                const dateFormatted = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
                document.getElementById('summary-datetime').textContent = `${dateFormatted} - ${booking.time}`;
                
                const imgContainer = document.getElementById('summary-service-images');
                if(s.photo) {
                    imgContainer.innerHTML = `<img src="${s.photo}" class="w-14 h-14 rounded-xl object-cover border border-gray-200 shadow-sm">`;
                } else {
                    imgContainer.innerHTML = `<div class="w-14 h-14 rounded-xl theme-bg flex items-center justify-center text-white font-bold text-xl shadow-sm">${s.name[0]}</div>`;
                }
            };

            confirmationForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-confirm');
                btn.disabled = true;
                btn.innerHTML = '<i class="bi bi-hourglass-split animate-spin"></i> Agendando...';
                
                const data = {
                    establishmentId: REAL_ESTABLISHMENT_ID, 
                    services: booking.services,
                    professionalId: booking.professionalId,
                    clientName: document.getElementById('clientName').value,
                    clientPhone: document.getElementById('clientPhone').value,
                    startTime: new Date(`${booking.date}T${booking.time}:00`).toISOString()
                };

                try {
                    const res = await fetch(`${API_BASE_URL}/api/appointments`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    if(!res.ok) throw new Error();
                    
                    document.querySelector('main').innerHTML = `
                        <div class="text-center py-12 fade-in">
                            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border-4 border-white">
                                <i class="bi bi-check-lg text-4xl text-green-500"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-gray-800 mb-3">Tudo Certo!</h2>
                            <p class="text-gray-600 px-4 mb-8">O seu horário foi reservado com sucesso. Lembre-se de chegar com 5 minutinhos de antecedência.</p>
                            <button onclick="location.reload()" class="bg-gray-100 text-gray-700 font-bold py-3 px-8 rounded-xl hover:bg-gray-200 transition-colors">Voltar ao Início</button>
                        </div>
                    `;
                } catch {
                    showNotificationModal('Erro', 'Não foi possível agendar. Verifique a sua ligação e tente novamente.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-check2-circle"></i> Confirmar Horário';
                }
            });

            const openAppointments = () => {
                myAppointmentsView.classList.remove('hidden');
                document.getElementById('booking-view').classList.add('hidden');
                document.getElementById('branch-selector-view').classList.add('hidden');

                myAppointmentsContent.innerHTML = `
                    <div class="text-center mt-10 fade-in">
                        <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="bi bi-calendar2-heart text-2xl text-indigo-500"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">Seus Agendamentos</h3>
                        <p class="text-sm text-gray-500 mb-8 px-4">Digite o seu WhatsApp para consultar os seus horários.</p>
                        <form id="lookupForm" class="max-w-xs mx-auto">
                            <input type="tel" id="lookupPhone" maxlength="15" class="w-full p-3.5 border border-gray-300 rounded-xl text-center mb-4 text-lg font-medium shadow-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="(00) 00000-0000" required>
                            <button type="submit" class="w-full theme-bg text-white py-3.5 rounded-xl font-bold text-lg shadow-md hover:opacity-90 transition-opacity">Buscar Horários</button>
                        </form>
                    </div>
                `;
                
                setupPhoneMask('lookupPhone');
                
                document.getElementById('lookupForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const phone = document.getElementById('lookupPhone').value;
                    myAppointmentsContent.innerHTML = '<div class="loader mx-auto mt-20"></div>';
                    
                    try {
                        const targetId = REAL_ESTABLISHMENT_ID || URL_ID; // Se for loja mãe, busca nela
                        const res = await fetch(`${API_BASE_URL}/api/client-portal/appointments/${targetId}?phone=${encodeURIComponent(phone)}`);
                        if(!res.ok) throw new Error();
                        const appts = await res.json();
                        
                        if(appts.length === 0) {
                            myAppointmentsContent.innerHTML = `
                                <div class="text-center mt-20">
                                    <i class="bi bi-calendar-x text-4xl text-gray-300 mb-3 block"></i>
                                    <p class="text-gray-500 font-medium">Nenhum agendamento encontrado para este número.</p>
                                </div>`;
                            return;
                        }
                        
                        myAppointmentsContent.innerHTML = `<div class="space-y-4 pb-10 max-w-lg mx-auto mt-6">
                            ${appts.map(a => {
                                const photoUrl = a.professionalPhoto || `https://ui-avatars.com/api/?name=${encodeURIComponent(a.professionalName || 'P')}&background=random&color=fff`;
                                const dateFormatted = new Date(a.startTime).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                                
                                let statusLabel = 'Confirmado';
                                let statusClass = 'bg-green-100 text-green-700 border-green-200';
                                
                                if (a.status === 'completed') {
                                    statusLabel = 'Finalizado';
                                    statusClass = 'bg-gray-100 text-gray-600 border-gray-200';
                                } else if (a.status === 'cancelled') {
                                    statusLabel = 'Cancelado';
                                    statusClass = 'bg-red-50 text-red-600 border-red-100';
                                }

                                return `
                                <div class="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex items-start gap-4">
                                    <img src="${photoUrl}" alt="Profissional" class="w-14 h-14 rounded-full object-cover border-2 border-gray-50 flex-shrink-0">
                                    <div class="flex-grow min-w-0">
                                        <div class="flex justify-between items-start mb-1">
                                            <p class="font-bold text-base text-gray-900 truncate">${a.professionalName || 'Profissional'}</p>
                                            <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded border ${statusClass}">
                                                ${statusLabel}
                                            </span>
                                        </div>
                                        <p class="text-sm text-gray-600 font-medium truncate">${a.serviceName}</p>
                                        <p class="text-xs text-gray-500 mt-2 bg-gray-50 inline-block px-2 py-1 rounded-md border border-gray-100">
                                            <i class="bi bi-clock mr-1"></i> ${dateFormatted}
                                        </p>
                                        ${a.status !== 'completed' && a.status !== 'cancelled' ? 
                                            `<button onclick="cancelAppt('${a.id}', '${phone}')" class="mt-4 w-full text-sm text-red-600 border border-red-200 py-2 rounded-xl hover:bg-red-50 font-bold transition-colors">Cancelar Horário</button>` 
                                            : ''}
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>`;
                    } catch {
                        myAppointmentsContent.innerHTML = '<p class="text-center text-red-500 mt-10">Erro na base de dados.</p>';
                    }
                };
            };
            
            window.cancelAppt = async (id, phone) => {
                if(!confirm('Deseja realmente cancelar este horário?')) return;
                try {
                    const targetId = REAL_ESTABLISHMENT_ID || URL_ID;
                    await fetch(`${API_BASE_URL}/api/client-portal/appointments/${id}/cancel`, {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({phone, establishmentId: targetId}) 
                    });
                    showNotificationModal('Sucesso', 'O seu agendamento foi cancelado.');
                    setTimeout(() => location.reload(), 1500); 
                } catch {
                    showNotificationModal('Erro', 'Não foi possível cancelar.');
                }
            };

            myAppointmentsBtn.addEventListener('click', openAppointments);
            document.querySelector('[data-action="close-appointments-view"]').addEventListener('click', () => {
                myAppointmentsView.classList.add('hidden');
                
                if (document.getElementById('branches-list').innerHTML.trim() !== '') {
                    branchSelectorView.classList.remove('hidden');
                } else {
                    document.getElementById('booking-view').classList.remove('hidden');
                }
            });

            // --- INICIA A VERIFICAÇÃO MULTI-TENANT ---
            checkNetworkAndLoad();
            
            prevWeekBtn.onclick = () => { currentWeekStart.setDate(currentWeekStart.getDate() - 7); renderWeek(); };
            nextWeekBtn.onclick = () => { currentWeekStart.setDate(currentWeekStart.getDate() + 7); renderWeek(); };
        });
    </script>
</body>
</html>
