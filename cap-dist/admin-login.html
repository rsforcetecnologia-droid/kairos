<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
  <script type="module" crossorigin src="/assets/adminLogin-CFRFrSJk.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/firebase-config-C2tbVz-J.js">
<link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
<body class="bg-gray-900 flex items-center justify-center h-screen text-gray-200">

    <div class="w-full max-w-sm">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">KAIROS</h1>
            <p class="text-gray-400 mt-2">Painel de Super-Administrador</p>
        </header>

        <div class="bg-gray-800 rounded-lg shadow-xl p-8">
            <form id="loginForm">
                <div class="mb-4">
                    <label for="email" class="block mb-2 text-sm font-medium">E-mail</label>
                    <input type="email" id="email" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="text-sm font-medium">Senha</label>
                        <a href="#" id="forgotPasswordLink" class="text-sm text-indigo-400 hover:text-indigo-300">Esqueci a senha</a>
                    </div>
                    <input type="password" id="password" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" required>
                </div>

                <div id="errorMessage" class="hidden text-center text-red-400 text-sm mb-4"></div>
                <div id="successMessage" class="hidden text-center text-green-400 text-sm mb-4"></div>

                <button type="submit" id="loginButton" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-300 disabled:bg-indigo-400">
                    <span>Entrar</span>
                </button>
            </form>

            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-600"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase">Ou</span>
                <div class="flex-grow border-t border-gray-600"></div>
            </div>

            <button id="googleLoginButton" class="w-full bg-white text-gray-900 font-bold py-3 px-4 rounded-lg hover:bg-gray-200 transition duration-300 flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
                <span>Entrar com Google</span>
            </button>
        </div>
    </div>

</body>
</html>
