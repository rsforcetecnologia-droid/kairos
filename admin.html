<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Super Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' },
                        sidebar: '#0f172a',
                        sidebarHover: '#1e293b'
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f8fafc; }
        
        /* Scrollbar customizada para o Admin */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Loading global simples */
        .loader {
            border: 3px solid #f3f4f6; border-top: 3px solid #3b82f6;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Animações de entrada */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800 antialiased selection:bg-brand-500 selection:text-white">

    <aside class="w-[260px] bg-sidebar text-slate-300 flex flex-col flex-shrink-0 transition-all duration-300 z-20">
        
        <div class="h-20 flex items-center px-6 border-b border-white/5">
            <div class="flex items-center gap-3 text-white">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center shadow-lg shadow-brand-500/30">
                    <i class="bi bi-lightning-charge-fill text-lg"></i>
                </div>
                <span class="font-black text-xl tracking-tight">KAIROS <span class="font-medium text-brand-500 text-sm">SaaS</span></span>
            </div>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1">
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Gestão Principal</p>
            
            <a href="#dashboard" class="menu-item group flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold text-sm transition-all hover:bg-sidebarHover hover:text-white mb-1">
                <i class="bi bi-grid-1x2-fill text-slate-400 group-hover:text-brand-500 transition-colors"></i>
                Visão Geral
            </a>
            
            <a href="#establishments" class="menu-item group flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold text-sm transition-all hover:bg-sidebarHover hover:text-white mb-1">
                <i class="bi bi-buildings-fill text-slate-400 group-hover:text-brand-500 transition-colors"></i>
                Clientes (Redes)
            </a>
            
            <a href="#financial" class="menu-item group flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold text-sm transition-all hover:bg-sidebarHover hover:text-white mb-1">
                <i class="bi bi-credit-card-2-front-fill text-slate-400 group-hover:text-brand-500 transition-colors"></i>
                Planos & Faturas
            </a>

            <div class="my-6 border-t border-white/5"></div>
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 mt-5">Sistema</p>
            
            <a href="#whatsapp" class="menu-item group flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold text-sm transition-all hover:bg-sidebarHover hover:text-white mb-1">
                <i class="bi bi-whatsapp text-slate-400 group-hover:text-brand-500 transition-colors"></i>
                Instâncias WhatsApp
            </a>
            
            <a href="#team" class="menu-item group flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold text-sm transition-all hover:bg-sidebarHover hover:text-white mb-1">
                <i class="bi bi-shield-lock-fill text-slate-400 group-hover:text-brand-500 transition-colors"></i>
                Admin Internos
            </a>
            
            <a href="#settings" class="menu-item group flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold text-sm transition-all hover:bg-sidebarHover hover:text-white mb-1">
                <i class="bi bi-gear-fill text-slate-400 group-hover:text-brand-500 transition-colors"></i>
                Config. Globais
            </a>
        </nav>

        <div class="p-4 border-t border-white/5">
            <div class="bg-sidebarHover rounded-xl p-3 flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-slate-300 font-bold text-xs border border-slate-600">
                    AD
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold text-white truncate">Super Admin</p>
                    <p id="user-role-display" class="text-[9px] text-brand-400 font-medium truncate uppercase tracking-widest">Carregando...</p>
                </div>
            </div>
        </div>

    </aside>

    <div class="flex-1 flex flex-col min-w-0 bg-slate-50">
        
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10 flex-shrink-0">
            <div class="flex items-center gap-4">
                <h2 id="page-title" class="text-xl font-black text-slate-800 tracking-tight">Painel</h2>
            </div>
            
            <div class="flex items-center gap-4">
                <button class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-brand-600 transition-colors border border-slate-200">
                    <i class="bi bi-bell-fill"></i>
                </button>
                <div class="w-px h-8 bg-slate-200"></div>
                <button id="btn-logout" class="flex items-center gap-2 px-4 py-2 bg-rose-50 text-rose-600 hover:bg-rose-100 hover:text-rose-700 rounded-lg text-sm font-bold transition-colors border border-rose-100 active:scale-95">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </button>
            </div>
        </header>

        <main id="dynamic-content" class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="h-full flex flex-col items-center justify-center text-slate-400">
                <div class="loader mb-4"></div>
                <p class="font-medium text-sm animate-pulse">Iniciando ambiente seguro...</p>
            </div>
        </main>
        
    </div>

    <div id="genericModal" style="display: none;"></div>
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        import { initializeSecurity, logoutAdmin, currentUserRole } from './js/admin/super-security.js';
        import { loadDashboard } from './js/admin/super-dashboard.js';
        import { loadEstablishments } from './js/admin/super-establishments.js';
        import { loadFinancial } from './js/admin/super-financial.js'; 
        
        initializeSecurity();

        document.getElementById('btn-logout').addEventListener('click', logoutAdmin);

        const menuLinks = document.querySelectorAll('.menu-item');
        const contentArea = document.getElementById('dynamic-content'); 
        const pageTitle = document.getElementById('page-title');
        
        // Estilo ativo do Tailwind
        const activeClasses = ['bg-brand-600', 'text-white', 'shadow-md', 'shadow-brand-500/20'];
        const inactiveClasses = ['hover:bg-sidebarHover', 'hover:text-white'];
        
        menuLinks.forEach(link => {
            link.addEventListener('click', async (e) => {
                e.preventDefault();
                
                // Reset de classes
                menuLinks.forEach(l => {
                    l.classList.remove(...activeClasses);
                    l.classList.add(...inactiveClasses);
                    const icon = l.querySelector('i');
                    if(icon) icon.classList.replace('text-white', 'text-slate-400');
                });
                
                // Aplica classe ativa
                const target = e.currentTarget;
                target.classList.remove(...inactiveClasses);
                target.classList.add(...activeClasses);
                const activeIcon = target.querySelector('i');
                if(activeIcon) activeIcon.classList.replace('text-slate-400', 'text-white');
                
                // Atualiza Título (Sem os ícones do HTML)
                pageTitle.innerText = target.innerText.trim();

                if(currentUserRole) {
                    document.getElementById('user-role-display').innerText = currentUserRole;
                }

                const moduleName = target.getAttribute('href').replace('#', '');
                
                // Animação de transição limpa
                contentArea.innerHTML = '<div class="flex h-full items-center justify-center"><div class="loader"></div></div>';
                
                setTimeout(async () => {
                    if (moduleName === 'dashboard') {
                        await loadDashboard(contentArea);
                    } 
                    else if (moduleName === 'establishments') {
                        await loadEstablishments(contentArea);
                    }
                    else if (moduleName === 'financial') {
                        await loadFinancial(contentArea);
                    }
                    else {
                        contentArea.innerHTML = `
                            <div class="flex flex-col items-center justify-center h-full text-slate-400">
                                <i class="bi bi-tools text-5xl mb-4 opacity-30"></i>
                                <h3 class="text-lg font-bold text-slate-600">Módulo em Desenvolvimento</h3>
                                <p class="text-sm mt-1">A seção "${moduleName}" estará disponível em breve.</p>
                            </div>
                        `;
                    }
                }, 300); // Pequeno delay para a UI respirar
            });
        });

        // Auto-click inicial
        setTimeout(() => {
            const firstMenu = document.querySelector('.menu-item[href="#dashboard"]');
            if(firstMenu) firstMenu.click();
        }, 1000);

    </script>
</body>
</html>
